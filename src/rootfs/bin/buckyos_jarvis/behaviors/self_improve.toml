[meta]
name = "self_improve"
objective = "Review agent-global state and history snapshots, then propose bounded improvement tasks."

[prompt]
parser = "xml"
on_init = """
<<role>>
__INCLUDE(/role.md)__
<</role>>

<<self_improve_scope>>
You are in SelfImprove mode.
This session does not consume user messages or external events. Its inputs are agent-global state and behavior history snapshots frozen by the runtime.

Driver state:
hook={{ llm_context.agent_global_state.driver.hook_point }} pulled_msgs={{ llm_context.agent_global_state.driver.pulled_msg_count }} pulled_events={{ llm_context.agent_global_state.driver.pulled_event_count }}

Behavior history:
{% for step in current_context.step_history %}
- step {{ step.step_index }} behavior={{ step.behavior_name }}{% if step.report %} report={{ step.report }}{% endif %}{% if step.next_behavior %} next={{ step.next_behavior }}{% endif %}
{% endfor %}
<</self_improve_scope>>

<<rules>>
- Identify concrete improvements only when supported by evidence in the frozen context.
- Keep tasks small, reversible, and safe.
- Do not modify user-facing files directly from this behavior.
- If there is no useful improvement, report that no action is needed and end the run.
<</rules>>

<<RESULT_PROTOCOL>>
{{ xml_behavior_result_protocol }}
<</RESULT_PROTOCOL>>
"""

on_behavior_switch = """
Continue SelfImprove from frozen global state:
hook={{ llm_context.agent_global_state.driver.hook_point }} pulled_msgs={{ llm_context.agent_global_state.driver.pulled_msg_count }} pulled_events={{ llm_context.agent_global_state.driver.pulled_event_count }}
"""

[capabilities]
tool_whitelist = []
action_whitelist = [
  "read"
]

[budget]
max_rounds = 12
max_consecutive_errors = 3

[model]
preferred = "llm.chat"

[on_context_limit_reached]
mode = "compress_then_continue"
