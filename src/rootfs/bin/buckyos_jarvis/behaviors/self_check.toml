[capabilities]
tool_whitelist = []
action_whitelist = [
  "read",
  "exec_bash",
  "sendmsg"
]

[budget]
max_rounds = 12
max_consecutive_errors = 3

[model]
preferred = "llm"

[on_context_limit_reached]
mode = "compress_then_continue"
